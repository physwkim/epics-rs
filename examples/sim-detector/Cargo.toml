[package]
name = "sim-detector"
version.workspace = true
edition.workspace = true
description = "Simulated areaDetector driver for areadetector-rs"
publish = false

[features]
ioc = ["dep:epics-base-rs", "dep:ad-plugins-rs", "ad-plugins-rs/ioc", "ad-plugins-rs/pva", "ad-core-rs/ioc", "asyn-rs/epics"]

[dependencies]
ad-core-rs = { workspace = true }
ad-plugins-rs = { workspace = true, optional = true }
asyn-rs = { workspace = true }
rand = "0.9"
parking_lot = "0.12"
epics-base-rs = { workspace = true, optional = true }

[[bin]]
name = "sim_ioc"
path = "src/bin/sim_ioc.rs"
required-features = ["ioc"]

[[example]]
name = "demo"
path = "examples/demo.rs"
