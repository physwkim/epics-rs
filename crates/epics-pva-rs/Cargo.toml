[package]
name = "epics-pva-rs"
version.workspace = true
edition.workspace = true
description = "EPICS pvAccess protocol client (experimental)"
license-file = "LICENSE"
authors.workspace = true
repository.workspace = true

[dependencies]
epics-base-rs = { workspace = true }
spvirit-client = "0.1.6"
spvirit-codec = "0.1.6"
spvirit-server = "0.1.6"
spvirit-types = "0.1.6"
tracing = "0.1"
tokio = { version = "1", features = ["full"] }
clap = { version = "4", features = ["derive"] }
chrono = "0.4"
serde_json = "1.0"
thiserror = "2"

[[bin]]
name = "pvaget-rs"
path = "src/bin/pvaget-rs.rs"

[[bin]]
name = "pvaput-rs"
path = "src/bin/pvaput-rs.rs"

[[bin]]
name = "pvamonitor-rs"
path = "src/bin/pvamonitor-rs.rs"

[[bin]]
name = "pvainfo-rs"
path = "src/bin/pvainfo-rs.rs"
