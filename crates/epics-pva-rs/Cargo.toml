[package]
name = "epics-pva-rs"
version.workspace = true
edition.workspace = true
description = "EPICS pvAccess protocol client (experimental)"
license.workspace = true
authors.workspace = true
repository.workspace = true

[dependencies]
epics-base-rs = { workspace = true }
tokio = { version = "1", features = ["full"] }
clap = { version = "4", features = ["derive"] }
chrono = "0.4"
thiserror = "2"

[[bin]]
name = "pvaget-rs"
path = "src/bin/pvaget-rs.rs"

[[bin]]
name = "pvaput-rs"
path = "src/bin/pvaput-rs.rs"

[[bin]]
name = "pvamonitor-rs"
path = "src/bin/pvamonitor-rs.rs"

[[bin]]
name = "pvainfo-rs"
path = "src/bin/pvainfo-rs.rs"
