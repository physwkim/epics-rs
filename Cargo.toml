[workspace]
members = ["crates/*", "examples/*"]
default-members = [
    "crates/ad-core-rs",
    "crates/ad-plugins-rs",
    "crates/asyn-rs",
    "crates/epics-base-rs",
    "crates/epics-ca-rs",
    "crates/epics-macros-rs",
    "crates/epics-pva-rs",
    "crates/epics-rs",
    "crates/epics-seq-rs",
    "crates/motor-rs",
    "crates/snc-core-rs",
    "crates/snc-rs",
    "crates/std-rs",
    "crates/scaler-rs",
]
resolver = "3"

[workspace.package]
edition = "2024"
version = "0.7.3"
authors = ["Sang Woo Kim <sngwkim915@gmail.com>"]
license = "MIT"
repository = "https://github.com/epics-rs/epics-rs"

[workspace.dependencies]
ad-core-rs = { path = "crates/ad-core-rs", version = "0.7.3" }
ad-plugins-rs = { path = "crates/ad-plugins-rs", version = "0.7.3" }
asyn-rs = { path = "crates/asyn-rs", version = "0.7.3" }
epics-base-rs = { path = "crates/epics-base-rs", version = "0.7.3" }
epics-ca-rs = { path = "crates/epics-ca-rs", version = "0.7.3" }
epics-macros-rs = { path = "crates/epics-macros-rs", version = "0.7.3" }
epics-pva-rs = { path = "crates/epics-pva-rs", version = "0.7.3" }
epics-seq-rs = { path = "crates/epics-seq-rs", version = "0.7.3" }
motor-rs = { path = "crates/motor-rs", version = "0.7.3" }
snc-core-rs = { path = "crates/snc-core-rs", version = "0.7.3" }
std-rs = { path = "crates/std-rs", version = "0.7.3" }
scaler-rs = { path = "crates/scaler-rs", version = "0.7.3" }
