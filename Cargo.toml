[workspace]
members = ["crates/*", "examples/*"]
default-members = [
    "crates/ad-core",
    "crates/ad-plugins",
    "crates/asyn",
    "crates/autosave",
    "crates/busy",
    "crates/calc",
    "crates/epics-base",
    "crates/epics-ca",
    "crates/epics-macros",
    "crates/motor",
    "crates/msi",
    "crates/seq",
    "crates/snc",
    "crates/epics-pva",
    "crates/epics-rs",
    "crates/snc-core",
]
resolver = "3"

[workspace.package]
edition = "2024"
version = "0.6.1"
authors = ["Sang Woo Kim <sngwkim915@gmail.com>"]
license = "MIT"
repository = "https://github.com/epics-rs/epics-rs"

[workspace.dependencies]
ad-core-rs = { path = "crates/ad-core", version = "0.6.1" }
ad-plugins-rs = { path = "crates/ad-plugins", version = "0.6.1" }
asyn-rs = { path = "crates/asyn", version = "0.6.1" }
epics-base-rs = { path = "crates/epics-base", version = "0.6.1" }
epics-ca-rs = { path = "crates/epics-ca", version = "0.6.1" }
epics-pva-rs = { path = "crates/epics-pva", version = "0.6.1" }
epics-macros-rs = { path = "crates/epics-macros", version = "0.6.1" }
snc-core-rs = { path = "crates/snc-core", version = "0.6.1" }
epics-seq-rs = { path = "crates/seq", version = "0.6.1" }
motor-rs = { path = "crates/motor", version = "0.6.1" }
epics-calc-rs = { path = "crates/calc", version = "0.6.1" }
autosave-rs = { path = "crates/autosave", version = "0.6.1" }
busy-rs = { path = "crates/busy", version = "0.6.1" }
msi-rs = { path = "crates/msi", version = "0.6.1" }
